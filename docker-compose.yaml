version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: microfinance-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microfinance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microfinance

volumes:
  postgres_data:
  
networks:
  microfinance:
